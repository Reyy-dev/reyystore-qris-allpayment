<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Foto + YouTube Audio (881×1240)</title>
  <style>
    :root{background:#111}
    html,body{height:100%;margin:0;display:flex;align-items:center;justify-content:center}
    .frame{
      width:881px;
      height:1240px;
      position:relative;
      overflow:hidden;
      border-radius:6px;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      background:#222;
      background-size:cover;
      background-position:center;
    }
    .controls{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:80px;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:auto;
    }
    .btn{
      padding:18px 36px;
      border-radius:10px;
      background:linear-gradient(135deg,#6a5acd,#00bfff);
      border:none;
      cursor:pointer;
      color:#fff;
      font-size:22px;
      font-weight:bold;
      font-family:sans-serif;
      box-shadow:0 6px 18px rgba(0,0,0,0.4);
      transition:transform .15s ease, box-shadow .15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover{box-shadow:0 8px 24px rgba(0,0,0,0.5)}
    .btn:active{transform:scale(.95)}
    #yt-player{position:absolute;left:-9999px;top:auto;width:1px;height:1px;opacity:0}
    @media (max-width:900px){
      html,body{padding:10px}
      .frame{transform:scale(.7);transform-origin:center top}
    }
  </style>
</head>
<body>
  <div class="frame" style="background-image: url('https://files.catbox.moe/9h7d9q.jpg');">
    <div id="player-wrap">
      <div id="yt-player"></div>
    </div>
    <div class="controls">
      <button class="btn" id="btn-on">Play Music</button>
    </div>
  </div>

  <script>
    // ID dari link https://youtu.be/wvhGsbPodM0?si=...
    var YT_VIDEO_ID = 'wvhGsbPodM0';

    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        height: '1',
        width: '1',
        videoId: YT_VIDEO_ID,
        playerVars: {
          autoplay: 0,
          controls: 0,
          modestbranding: 1,
          rel: 0,
          fs: 0
        }
      });
    }

    var btnOn = document.getElementById('btn-on');
    btnOn.addEventListener('click', function(){
      if (player && typeof player.playVideo === 'function') {
        try{player.unMute();}catch(e){}
        player.playVideo();
        btnOn.style.background = 'linear-gradient(135deg,#00bfff,#6a5acd)';
      }
    });

    document.addEventListener('touchstart', function(){}, {passive:true});
  </script>
</body>
</html>
